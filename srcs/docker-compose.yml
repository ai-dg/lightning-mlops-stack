services:
  # ── Monitoring ─────────────────────────────────────────────────────────────
  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - model:/usr/share/model/

  # ── MinIO (Data Lake & Artifacts) ──────────────────────────────────────────
  minio:
    container_name: minio
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data
    ports:
      - "9000:9000"
    volumes:
      - mlflow-minio:/data
    networks:
      - postgres_network # Ajouté pour que MLflow puisse le voir

  # ── Metrics (MLflow) ───────────────────────────────────────────────────────
  mlflow:
    container_name: mlflow-server
    image: ghcr.io/mlflow/mlflow:v2.17.0
    ports:
      - "${MLFLOW_SERVER_PORT:-5000}:5000"
    environment:
      MLFLOW_SERVER_HOST: 0.0.0.0
      MLFLOW_SERVER_PORT: 5000
      BACKEND_STORE_URI: postgresql+psycopg2://mlflow:mlflow@postgres_db:5432/mlflowdb
      ARTIFACT_ROOT: s3://mlflow-artifacts
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
    command: >
      mlflow server
      --backend-store-uri postgresql+psycopg2://mlflow:mlflow@postgres_mlflow:5432/mlflowdb
      --default-artifact-root s3://mlflow-artifacts
      --host 0.0.0.0
      --port 5000
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - postgres_network

  # ── API ────────────────────────────────────────────────────────────────────
  fastapi:
    container_name: fastapi
    build:
      context: ./api
      dockerfile: Dockerfile
    expose:
      - 4243
    ports:
      - "4243:4243"

  # ── Gateway ────────────────────────────────────────────────────────────────
  nginx:
    container_name: nginx
    build:
      context: ./services/nginx
      dockerfile: Dockerfile

  # ── Database (app) ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - postgres_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    ports:
      - "8080:80"
    depends_on:
      - postgres
    networks:
      - postgres_network

  # ── Frontend ───────────────────────────────────────────────────────────────
  streamlite:
    container_name: streamlite
    build:
      context: ./services/streamlite
      dockerfile: Dockerfile

volumes:
  postgres_data:

  mlflow-minio:

  model:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PWD}/srcs/data/artifacts

networks:
  postgres_network:
    driver: bridge
